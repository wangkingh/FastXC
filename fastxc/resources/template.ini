; ======================== FastXC Configuration Template ========================
; New-style array configuration:
;   [seisarrayN] or [seisarrayN.source_name], where N is 1..9.
;   Sections sharing the same N are merged into the same logical group.
;   The GNSL group field is exactly N, e.g. 1.VV.0101.00.
;
; Path pairing:
;   group_pair_mode = intra  -> only within the same group
;   group_pair_mode = inter  -> only between different groups
;   group_pair_mode = all    -> within + between groups
; ============================================================================== 

[seisarray1]
sac_dir = ./
pattern = {home}/{*}/{*}/{station}.{YYYY}.{JJJ}.{*}.{component}.{suffix}
sta_list = NONE
component_list = E,N,Z

; Example: a second physical source folded into group 1.
; [seisarray1.network_b]
; sac_dir = /data/network_b
; pattern = {home}/{network}/{station}/{YYYY}/{station}.{YYYY}.{JJJ}.{component}.{suffix}
; sta_list = NONE
; component_list = E,N,Z

; Example: a separate logical group.
; [seisarray2]
; sac_dir = /data/array2
; pattern = {home}/{station}/{YYYY}/{station}.{YYYY}.{JJJ}.{component}.{suffix}
; sta_list = NONE
; component_list = E,N,Z

[time_filter]
time_start = 2017-09-01 00:00:00
time_end = 2017-09-30 01:00:00
time_list = NONE

[geometry]
external_geo_tsv = NONE

[executables]
executable_root = AUTO
sac2spec = AUTO
xc = AUTO
pws = AUTO
tfpws = AUTO

[preprocess]
sac_len = 86400
win_len = 3600
shift_len = 3600
delta = 0.1
; AUTO -> RUN-ABS for one band, RUN-ABS-MF for multiple bands.
; You can also set RUN-ABS, RUN-ABS-MF, ONE-BIT, or OFF explicitly.
normalize = AUTO
bands = 0.1/0.5 0.5/1 1/2
; AFTER means time-domain normalization first, then spectral whitening.
whiten = AFTER
; Final phase-only SEGSPEC output is available, but off by default.
output_phase_only = False

[xcorr]
max_lag = 100
distance_range = -1/50000
azimuth_range = -1/360
group_pair_mode = all

[advance.preprocess]
; -1 keeps all windows. Use comma-separated window indexes only for debugging.
skip_step = -1

[advance.xcorr]
; FastXC formal pipeline writes XC pack shards and SourcePack indexes.
write_mode = PACK
write_segment = False

[advance.xcache]
; AUTO keeps every window from one timestamp SEGSPEC set in one .xcspec.
; Set a positive integer to write one .xcspec per N windows.
windows_per_xcache = AUTO
; While SAC2SPEC is running, build xcache/<timestamp>.xcspec as soon as
; spack_by_timestamp/<timestamp>/_SUCCESS appears.
async_after_sac2spec = True
async_poll_sec = 5
; True deletes spack_by_timestamp/<timestamp> after its xcache shards are ready.
; This is handled by the async spack sweeper. Set False when debugging SAC2SPEC output.
cleanup_timestamp_spack = True

[advance.sourcepack]
enabled = True
; True writes an index ordered by source -> receiver -> source component -> receiver component.
; This stage does not copy NCF bytes; it points back into native xcpack files.
sort_within_source = True
; While XC is running, materialize sourcepack/<timestamp>/sourcepack_index.tsv
; as soon as native XC writes xcpack/<timestamp>.done.
async_after_xc = True
async_poll_sec = 5

[unpack]
; Final export step. It runs after stack and rotation, and is enabled by default
; so final SAC products are materialized alongside the SourcePack outputs.
enabled = True
; FINAL exports rotated SourcePack if present, otherwise stack SourcePack.
; Other choices: STACK, ROTATE, ALL. Raw XC SourcePack is unpacked only by the
; standalone fastxc unpack/tools/unpack.py debugging path.
target = FINAL
; AUTO writes to workspace_dir/unpacked. Relative paths are rooted at workspace_dir.
output_dir = AUTO
; 0 means use [device].cpu_workers.
threads = 0

[stack]
; stack_flag bits: linearstack / pws / tfpws. Default runs linearstack only.
stack_flag = 100
sub_stack_size = 10
; FULL keeps TF-PWS weighting on the whole spectrum. Use fmin/fmax to limit it.
tfpws_band = FULL
tfpws_taper_hz = AUTO

[device]
; gpu_list is a worker list. Repeats such as 0,0 are allowed for single-GPU multi-worker tests.
gpu_list = 0
; AUTO lets each native stage choose 0.90 * free memory, split by workers sharing one GPU.
; Use one MiB value per gpu_list worker, e.g. 8000,8000 or AUTO,12000.
gpu_memory_mib = AUTO
cpu_workers = 20

[storage]
; workspace_dir is the run root. prepare writes the inventory here,
; and run writes spack, xcache, NCF, stack, command review files, logs, and progress sidecars here.
workspace_dir = ./

[advance]
; debug disables native lazy async/write paths and favors easier tracing.
; Native programs honor FASTXC_LOG_LEVEL. Running FastXC with -v sets it to DEBUG
; unless the environment already defines FASTXC_LOG_LEVEL explicitly.
debug = False
