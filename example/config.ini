; Public smoke-test example generated from a small anonymized SAC subset.
; The waveform files are 1 Hz, station names are anonymized, timestamps were
; moved to 2022.137-2022.143, and station coordinates were translated to Kansas.
;
; Period bands:
;   2.5-5 s  -> 0.2/0.4 Hz
;   5-10 s   -> 0.1/0.2 Hz

[seisarray1]
sac_dir = data
pattern = {home}/{station}/{YYYY}/{station}.{YYYY}.{JJJ}.{*}.{component}.{suffix}
sta_list = NONE
component_list = E,N,Z

[time_filter]
time_start = 2022-05-17 00:00:00
time_end = 2022-05-23 00:00:00
time_list = NONE

[geometry]
; NONE reads station coordinates from SAC headers.
; To test external geometry loading, use: data/station_geo.tsv
external_geo_tsv = NONE

[executables]
executable_root = AUTO
sac2spec = AUTO
xc = AUTO
pws = AUTO
tfpws = AUTO

[compute]
sac_len = 86400
win_len = 3600
shift_len = AUTO
delta = 1.0
normalize = AUTO
bands = 0.2/0.4 0.1/0.2
whiten = AFTER
max_lag = 100
stack_flag = 100
workspace_dir = workspace

[device]
gpu_list = 0
cpu_workers = 20

[advance.compute]
skip_step = -1
phase_only = False
distance_range = -1/50000
azimuth_range = -1/360
group_pair_mode = all
windows_per_xcache = AUTO
xcache_async_after_sac2spec = True
async_poll_sec = 5
xcache_cleanup_timestamp_spack = True
sourcepack_async_after_xc = True
pre_stack_size = 10
tfpws_band = FULL
tfpws_taper_hz = AUTO

[advance.storage]
unpack_enabled = True
unpack_target = ALL

[debug]
debug = False
