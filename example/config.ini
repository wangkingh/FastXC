; Public smoke-test example generated from a small anonymized SAC subset.
; The waveform files are 1 Hz, station names are anonymized, timestamps were
; moved to 2022.137-2022.143, and station coordinates were translated to Kansas.
;
; Period bands:
;   2.5-5 s  -> 0.2/0.4 Hz
;   5-10 s   -> 0.1/0.2 Hz

[seisarray1]
sac_dir = data
pattern = {home}/{station}/{YYYY}/{station}.{YYYY}.{JJJ}.{*}.{component}.{suffix}
sta_list = NONE
component_list = E,N,Z

[time_filter]
time_start = 2022-05-17 00:00:00
time_end = 2022-05-23 00:00:00
time_list = NONE

[geometry]
external_geo_tsv = NONE

[executables]
executable_root = AUTO
sac2spec = AUTO
xc = AUTO
pws = AUTO
tfpws = AUTO

[preprocess]
sac_len = 86400
win_len = 3600
shift_len = 3600
delta = 1.0
normalize = AUTO
bands = 0.2/0.4 0.1/0.2
whiten = AFTER
output_phase_only = False

[xcorr]
max_lag = 100
distance_range = -1/50000
azimuth_range = -1/360
group_pair_mode = all

[advance.preprocess]
skip_step = -1

[advance.xcorr]
write_mode = PACK
write_segment = False

[advance.xcache]
; AUTO keeps every window from one timestamp SEGSPEC set in one .xcspec.
; Set a positive integer to write one .xcspec per N windows.
windows_per_xcache = AUTO
async_after_sac2spec = True
async_poll_sec = 5
cleanup_timestamp_spack = True

[advance.sourcepack]
enabled = True
sort_within_source = True
async_after_xc = True
async_poll_sec = 5

[stack]
stack_flag = 100
sub_stack_size = 10
tfpws_band = FULL
tfpws_taper_hz = AUTO

[device]
gpu_list = 0
cpu_workers = 20

[storage]
workspace_dir = workspace

[advance]
debug = False
